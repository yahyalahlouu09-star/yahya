<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><title>Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="contact-section">
    <h1 class="title">Restons en Contact</h1>
    <p class="subtitle">Une question ou un projet ? Envoyez-moi un message.</p>

    <div class="contact-container">
        <!-- Formulaire de contact -->
        <form class="contact-form">
            <input type="text" placeholder="Votre Nom" required>
            <input type="email" placeholder="Votre Email" required>
            <textarea placeholder="Votre Message" rows="5" required></textarea>
            <button type="submit" class="submit-btn">Envoyer</button>
        </form>

        <!-- Liens Sociaux -->
        <div class="social-links">
            <a href="https://github.com" target="_blank" class="social-card github">
                <span>GitHub</span>
            </a>
            <a href="https://linkedin.com" target="_blank" class="social-card linkedin">
                <span>LinkedIn</span>
            </a>
        </div>
        
        <p class="direct-email">Ou directement par mail : <span>yahyalahlouu09@gmail.com</span></p>
    </div>
</section>
</body>
</html>
